name: Update solana-verify version in Dockerfile

on:
  schedule:
    - cron: '0 9 * * 1' # Runs every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-solana-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Dockerfile to latest version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          PINNED=$(grep -oE 'solana-foundation/solana-verifiable-build --tag v[0-9]+\.[0-9]+\.[0-9]+' api/Dockerfile | sed -E 's/.* --tag //')
          LATEST=$(curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/solana-foundation/solana-verifiable-build/tags?per_page=100" \
            | jq -r '.[] | .name' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)

          test -n "$LATEST"

          if [ "$PINNED" = "$LATEST" ]; then
            echo "Already using the latest version: ${LATEST}"
            exit 0
          fi

          HIGHER=$(printf '%s\n' "$PINNED" "$LATEST" | sort -V | tail -1)

          if [ "$HIGHER" != "$LATEST" ]; then
            echo "Skipping update: current version (${PINNED}) is newer than upstream (${LATEST})"
            exit 0
          fi

          sed -i.bak "s/${PINNED}/${LATEST}/g" api/Dockerfile
          rm -f api/Dockerfile.bak

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: Update solana-verify version in Dockerfile
          title: 'Update solana-verify version in Dockerfile'
          body: |
            This updates the solana-verifiable-build version in `api/Dockerfile` to the latest release.

            Before merging, please run:
            `docker build -f api/Dockerfile .`
          branch: update-solana-verify-version
          delete-branch: true
          labels: |
            automated pr